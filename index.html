<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaser Monitor v3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="search-container">
        <input type="text" id="input-busca" placeholder="Cidade...">
        <button onclick="buscarLocalizacao()">🔍</button>
    </div>

    <div id="container-controles">
        <button id="btn-menu" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </button>
        <button id="btn-ativar-alertas" onclick="renderizarIconesNosMapas()">🔅 ALERTAS ☁️</button>
    </div>

    <div id="menu-lateral">
        <button onclick="toggleMenu()" style="background:none; border:none; color:red; font-size:25px; float:right;">✕</button>
        <div class="cat-title">ATMOSFERA</div>
        <button class="btn-layer" onclick="aplicarCamada('clouds')">☁️ Nuvens Reais</button>
        <button class="btn-layer" onclick="aplicarCamada('infra')">🌡️ Infravermelho</button>
        <div class="cat-title">RADAR</div>
        <button class="btn-layer" onclick="aplicarCamada('tempestades')">⛈️ Radar de Chuva</button>
        <button class="btn-layer" onclick="aplicarCamada('satelite_base')">🛰️ Satélite</button>
    </div>

    <div id="map"></div>

    <div id="painel-full">
        <button class="btn-close-full" onclick="fecharPainel()">✕</button>
        <div id="painel-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY_OWM = "7609a59c493758162d9b0a6af2914e1f"; 
        
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-22.12, -51.38], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let camadaAtual = 'default';
        let layerAtiva = null;

        function aplicarCamada(tipo) {
            camadaAtual = tipo;
            if(layerAtiva) map.removeLayer(layerAtiva);
            let url = "";
            if(tipo === 'clouds') url = `https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            if(tipo === 'infra') url = `https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            if(tipo === 'tempestades') url = `https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            if(tipo === 'satelite_base') url = 'http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}';
            if(url) layerAtiva = L.tileLayer(url, { opacity: 0.85, zIndex: 100, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
            toggleMenu();
        }

        map.on('click', async (e) => {
            const painel = document.getElementById('painel-full');
            painel.className = 'clima-view active';
            
            const res = await fetch(`/api/clima-clique?lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
            const d = await res.json();
            
            let camadaInfo = "";
            if(camadaAtual === 'tempestades') camadaInfo = `<div class="analise-box"><h2>⛈️ RADAR</h2><p>Precipitação: ${d.clima.current.rain ? d.clima.current.rain['1h'] : '0.0'} mm/s</p></div>`;
            if(camadaAtual === 'clouds') camadaInfo = `<div class="analise-box"><h2>☁️ NUVENS</h2><p>Cobertura: ${d.clima.current.clouds}%</p></div>`;

            document.getElementById('painel-content').innerHTML = `
                <div class="clima-section">
                    <h1>${d.geo.address.city || d.geo.address.town || "Localização"}</h1>
                    <div class="temp-val">${Math.round(d.clima.current.temp)}°C</div>
                    <div class="clima-grid">
                        <div class="c-item">👁️ Visib: ${d.clima.current.visibility / 1000}km</div>
                        <div class="c-item">💧 Umidade: ${d.clima.current.humidity}%</div>
                        <div class="c-item">🌬️ Vento: ${d.clima.current.wind_speed}km/h</div>
                        <div class="c-item">🍃 Ar: ${d.poluicao.list[0].main.aqi} AQI</div>
                        <div class="c-item">⏲️ Pressão: ${d.clima.current.pressure}hPa</div>
                        <div class="c-item">🌇 Pôr do Sol: ${new Date(d.clima.current.sunset * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                    ${camadaInfo}
                </div>`;
        });

        async function renderizarIconesNosMapas() {
            const res = await fetch('/api/alertas');
            const data = await res.json();

            // 🔅 INMET em Brasília
            L.marker([-15.79, -47.88], { icon: L.divIcon({html:'🔅', className:'map-icon'}) }).addTo(map).on('click', () => abrirAlerta('🔅 INMET BRASIL', data.inmet));

            // ☁️ NOAA em Washington
            L.marker([38.89, -77.03], { icon: L.divIcon({html:'☁️', className:'map-icon'}) }).addTo(map).on('click', () => abrirAlerta('☁️ NOAA USA', data.noaa));
        }

        function abrirAlerta(f, l) {
            let h = `<h1>${f}</h1>`;
            l.forEach(i => { h += `<div class="analise-box"><h3>${i.title || i.properties.event}</h3><p>${i.description || i.properties.headline}</p></div>`; });
            document.getElementById('painel-content').innerHTML = h;
            document.getElementById('painel-full').className = 'alerta-view active';
        }

        function toggleMenu() { document.getElementById('menu-lateral').classList.toggle('active'); }
        function fecharPainel() { document.getElementById('painel-full').classList.remove('active'); }
        async function buscarLocalizacao() {
            const q = document.getElementById('input-busca').value;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
            const data = await res.json();
            if(data[0]) map.setView([data[0].lat, data[0].lon], 11);
        }
    </script>
</body>
</html>
