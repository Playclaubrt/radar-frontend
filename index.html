<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaser Monitor v3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container-controles">
        <button id="btn-menu" onclick="toggleMenu()"><div class="bar"></div><div class="bar"></div><div class="bar"></div></button>
        <button onclick="renderizarIconesNosMapas()" id="btn-ativar-alertas">🔅 ALERTAS ☁️</button>
    </div>

    <div id="map"></div>
    <div id="legenda-infra"><div class="barra-infra"></div>INFRA: FRIO <-> CALOR</div>

    <div id="painel-full">
        <button class="btn-close-full" onclick="fecharPainel()">✕</button>
        <div id="painel-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY_OWM = "7609a59c493758162d9b0a6af2914e1f"; 
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-22.12, -51.38], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let camadaAtiva = 'default';
        let layerObjeto = null;

        // Tradutor de códigos Open-Meteo para seus Emojis
        function getEmojiMeteo(code) {
            if (code <= 1) return "🌞";
            if (code <= 3) return "🌤️";
            if (code <= 48) return "🌫️";
            if (code <= 67) return "🌧️";
            if (code <= 77) return "❄️";
            if (code <= 82) return "🌦️";
            if (code <= 99) return "⛈️";
            return "☁️";
        }

        map.on('click', async (e) => {
            if (e.originalEvent.target.classList.contains('map-icon')) return;
            const painel = document.getElementById('painel-full');
            painel.className = 'clima-view active';

            const res = await fetch(`/api/clima-clique?lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
            const d = await res.json();
            const cur = d.clima.current;
            const forecast = d.previsao_dias;

            // --- INFO DAS CAMADAS ---
            let infoCamada = "";
            if(camadaAtiva === 'tempestades') {
                infoCamada = `<div class="analise-box"><h3>⛈️ RADAR</h3><p><b>Tipo:</b> ${cur.temp > 2 ? 'Líquida' : 'Gelo'}</p><p><b>mm/s:</b> ${cur.temp > 15 ? '0.8' : '0.0'}</p><p><b>Direção:</b> ${cur.wind_deg}°</p></div>`;
            } else if(camadaAtiva === 'clouds') {
                infoCamada = `<div class="analise-box"><h3>☁️ NUVENS</h3><p><b>Tipo:</b> ${cur.clouds > 70 ? 'Cumulonimbus' : 'Cumulus'}</p><p><b>Altura:</b> ${cur.clouds > 50 ? 'Médio' : 'Baixo'}</p><p><b>Velocidade:</b> ${cur.wind_speed}km/h</p></div>`;
            } else if(camadaAtiva === 'infra') {
                infoCamada = `<div class="analise-box"><h3>🌡️ INFRA</h3><p><b>Cor:</b> ${cur.temp > 25 ? 'Vermelho' : 'Azul'}</p><p><b>Calor Emitido:</b> Ativo</p><p><b>Refletância:</b> ${cur.clouds}%</p></div>`;
            } else if(camadaAtiva === 'satelite_base') {
                infoCamada = `<div class="analise-box"><h3>🛰️ SATÉLITE</h3><p><b>Albedo:</b> Alto</p><p><b>Sensor:</b> Visível</p><p><b>Solo:</b> Orbital</p></div>`;
            }

            document.getElementById('painel-content').innerHTML = `
                <h1 style="margin:0">${d.geo.address.city || "Ponto"}</h1>
                <div class="temp-txt">${Math.round(cur.temp)}°C</div>
                <div style="margin-bottom:20px">${getEmojiMeteo(forecast.weathercode[0])} SEG, 17 de MAR 👾</div>

                <div class="clima-grid">
                    <div class="c-item"><b>💧 Umidade</b><br>${cur.humidity}%</div>
                    <div class="c-item"><b>🌬️ Vento</b><br>${cur.wind_speed}km/h</div>
                    <div class="c-item"><b>⏲️ Pressão</b><br>${cur.pressure}hPa</div>
                    <div class="c-item"><b>🍃 Ar</b><br>${d.poluicao.list[0].main.aqi} AQI</div>
                </div>

                <div class="quadrado-previsao">
                    <div class="dia-item"><b>SEG</b> <span>${getEmojiMeteo(forecast.weathercode[0])}</span></div>
                    <div class="dia-item"><b>TER</b> <span>${getEmojiMeteo(forecast.weathercode[1])}</span></div>
                    <div class="dia-item"><b>QUA</b> <span>${getEmojiMeteo(forecast.weathercode[2])}</span></div>
                    <div class="dia-item"><b>QUI</b> <span>${getEmojiMeteo(forecast.weathercode[3])}</span></div>
                    <div class="dia-item"><b>SEX</b> <span>${getEmojiMeteo(forecast.weathercode[4])}</span></div>
                </div>

                ${infoCamada}
            `;
        });

        function aplicarCamada(tipo) {
            camadaAtiva = tipo;
            if(layerObjeto) map.removeLayer(layerObjeto);
            document.getElementById('legenda-infra').style.display = (tipo === 'infra') ? 'block' : 'none';
            
            let url = "";
            if(tipo === 'clouds') url = `https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            if(tipo === 'infra') url = `https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            if(tipo === 'tempestades') url = `https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY_OWM}`;
            
            // SATÉLITE REAL (Google Satélite sem fios/nomes)
            if(tipo === 'satelite_base') url = 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'; 

            if(url) layerObjeto = L.tileLayer(url, { opacity: 0.8, zIndex: 100 }).addTo(map);
        }

        function fecharPainel() { document.getElementById('painel-full').classList.remove('active'); }
    </script>
</body>
</html>
